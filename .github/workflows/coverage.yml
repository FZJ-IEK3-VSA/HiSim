name: coverage

on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - pytest base tests
      - pytest extendedbase tests
      - pytest buildingtest
      - pytest system_setups
      - pytest jsonconfig
      - pytest PostProcessingOption-Tests
      - pytest others
      - pytest utsp
    types:
      - completed

permissions:
  actions: read
  contents: read

jobs:
  combine:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        ref: ${{ github.event.workflow_run.head_sha || github.sha }}
    - name: Set up Python 3.11
      uses: actions/setup-python@v3
      with:
        python-version: "3.11"
    - name: Install coverage
      run: |
        python -m pip install --upgrade pip
        python -m pip install coverage
    - name: Download coverage data from pytest workflows
      env:
        GH_TOKEN: ${{ github.token }}
        HEAD_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
        EVENT_NAME: ${{ github.event.workflow_run.event || '' }}
      run: |
        set -euo pipefail
        mkdir -p coverage-data

        workflows=(
          "pytest-base.yml:coverage-pytest-base"
          "pytest-extendedbase.yml:coverage-pytest-extendedbase"
          "pytest-buildingtest.yml:coverage-pytest-buildingtest"
          "pytest-system-setups.yml:coverage-pytest-system-setups"
          "pytest-jsonconfig.yml:coverage-pytest-jsonconfig"
          "pytest-postprocessingoptions.yml:coverage-pytest-postprocessingoptions"
          "pytest-others.yml:coverage-pytest-others"
          "pytest-utsp.yml:coverage-pytest-utsp"
        )

        missing_or_running=0
        failed=0

        for entry in "${workflows[@]}"; do
          workflow="${entry%%:*}"
          artifact="${entry##*:}"
          run_args=(--workflow "$workflow" --commit "$HEAD_SHA" --limit 1 --json databaseId,status,conclusion)
          if [ -n "$EVENT_NAME" ]; then
            run_args+=(--event "$EVENT_NAME")
          fi
          run_json="$(gh run list "${run_args[@]}" --jq '.[0] // empty')"

          if [ -z "$run_json" ]; then
            echo "No run found for $workflow at $HEAD_SHA ($EVENT_NAME) yet."
            missing_or_running=1
            continue
          fi

          run_id="$(jq -r '.databaseId' <<< "$run_json")"
          status="$(jq -r '.status' <<< "$run_json")"
          conclusion="$(jq -r '.conclusion' <<< "$run_json")"

          if [ "$status" != "completed" ]; then
            echo "$workflow is still $status."
            missing_or_running=1
            continue
          fi

          if [ "$conclusion" != "success" ]; then
            echo "$workflow completed with conclusion $conclusion."
            failed=1
            continue
          fi

          echo "Downloading $artifact from $workflow run $run_id"
          gh run download "$run_id" --name "$artifact" --dir "coverage-data/$artifact" || {
            echo "Coverage artifact $artifact was not available."
            missing_or_running=1
          }
        done

        if [ "$missing_or_running" -ne 0 ]; then
          echo "Not all pytest coverage artifacts are available yet. A later workflow_run will combine them."
          exit 0
        fi

        if [ "$failed" -ne 0 ]; then
          echo "At least one pytest workflow failed; skipping combined coverage."
          exit 1
        fi

        find coverage-data -type f -name '.coverage*' -print -quit | grep -q . || {
          echo "No coverage data files were downloaded."
          exit 1
        }
    - name: Combine coverage
      run: |
        mkdir -p coverage-combine
        index=0
        while IFS= read -r coverage_file; do
          cp "$coverage_file" "coverage-combine/.coverage.$index"
          index=$((index + 1))
        done < <(find coverage-data -type f -name '.coverage*')
        coverage combine coverage-combine
        coverage report
        coverage xml -o coverage.xml
        coverage html -d htmlcov
    - name: Upload combined coverage report
      uses: actions/upload-artifact@v4
      with:
        name: combined-coverage-report
        path: |
          coverage.xml
          htmlcov/
        if-no-files-found: error
