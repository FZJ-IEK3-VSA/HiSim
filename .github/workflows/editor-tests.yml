# Scenario-editor round-trip tests.
#
# Verifies that opening a shipped '*.scenario.json' in the web editor and saving it again
# preserves the scenario (save == open when nothing changes), across ALL system_setups.
#
# Two stages:
#   1. generate-db  -- regenerate component_db.json / enum_db.json from the live components
#                      (inside the HiSim container, which has the package installed) so the
#                      editor tests run against the current registry, not a stale snapshot.
#   2. editor-tests -- on a Node runner, run Tier 1 (Vitest data round-trip over every
#                      scenario) and Tier 2 (Playwright UI round-trip driving the real app).
#
# Gate: BLOCKING. See system_setups/editor/tests/README.md for what is asserted and why
# dynamic-port scenarios are held to the universal invariants only.

name: editor-tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
    paths:
      - 'system_setups/editor/**'
      - 'system_setups/*.scenario.json'
      - 'tools/generate_component_db.py'
      - '.github/workflows/editor-tests.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: read

concurrency:
  group: editor-tests-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  generate-db:
    name: regenerate component database
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/fzj-iek3-vsa/hisim-test:py311
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6
      - name: Mark workspace as safe for git
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - name: Install HiSim package
        run: uv pip install --system -e .
      - name: Regenerate component / enum / catalog databases
        run: python tools/generate_component_db.py
      - name: Upload generated databases
        uses: actions/upload-artifact@v6
        with:
          name: component-db
          path: system_setups/editor/public/data/*.json
          if-no-files-found: error

  editor-tests:
    name: round-trip tests (import → export)
    needs: generate-db
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: system_setups/editor
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: system_setups/editor/package-lock.json

      # Overwrite the committed DBs with the freshly generated ones so the tests match
      # the current component registry.
      - name: Download freshly generated databases
        uses: actions/download-artifact@v6
        with:
          name: component-db
          path: system_setups/editor/public/data

      # 'npm install' (not 'ci') so the newly added test deps resolve even before the
      # lockfile is refreshed. Switch to 'npm ci' once package-lock.json is committed with them.
      - name: Install JS dependencies
        run: npm install

      # ── Tier 1: fast data round-trip over every scenario JSON ──────────────
      - name: Unit round-trip tests (Vitest)
        run: npm run test

      # ── Tier 2: full UI round-trip via a headless browser ──────────────────
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - name: E2E round-trip tests (Playwright)
        run: npm run test:e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v6
        with:
          name: playwright-report
          path: system_setups/editor/playwright-report/
          if-no-files-found: ignore
