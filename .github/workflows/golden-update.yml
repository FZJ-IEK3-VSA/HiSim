# Manual "bless" of the golden KPI references. Regenerates EVERY pair (both the
# week and full-year horizons) in the CI container — so the reference environment
# matches the check environment — and opens a pull request with the updated
# golden_references/ for review. This is the only sanctioned way to update goldens.

name: golden-update

on:
  workflow_dispatch:
    inputs:
      reason:
        description: "Why are you re-blessing the goldens?"
        required: true
        default: "intentional simulation-output change"

permissions:
  contents: write
  pull-requests: write
  packages: read

jobs:
  discover:
    name: discover all pairs
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.gen.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6
      - id: gen
        run: echo "matrix=$(python3 scripts/golden_matrix.py)" >> "$GITHUB_OUTPUT"

  update:
    name: regenerate ${{ matrix.setup }} / ${{ matrix.param }}
    needs: discover
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/fzj-iek3-vsa/hisim-test:py311
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.discover.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v6
      - name: Mark workspace as safe for git
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - name: Install HiSim package
        run: uv pip install --system -e .
      - name: Regenerate golden for this pair
        run: python scripts/golden_update.py --setup "${{ matrix.setup }}" --param "${{ matrix.param }}"
      - name: Upload regenerated golden
        uses: actions/upload-artifact@v6
        with:
          name: golden-${{ matrix.setup }}-${{ matrix.param }}
          path: golden_references/${{ matrix.setup }}__${{ matrix.param }}.json
          if-no-files-found: error

  collect:
    name: assemble goldens and open PR
    needs: update
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/fzj-iek3-vsa/hisim-test:py311
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6
      - name: Mark workspace as safe for git
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - name: Download all regenerated goldens
        uses: actions/download-artifact@v4
        with:
          pattern: golden-*
          # Each artifact holds the file at its "golden_references/<pair>.json" path,
          # so extract at the workspace root to land them back in golden_references/.
          path: .
          merge-multiple: true
      - name: Install HiSim package
        run: uv pip install --system -e .
      - name: (Re)write manifest
        run: python scripts/golden_update.py --manifest-only
      - name: Open bless PR
        # The CI container has no `gh` CLI, so the PR is created via the GitHub REST API
        # with stdlib urllib. The workflow input is passed through the environment (never
        # interpolated into the script body) so it cannot break out of the JSON/shell.
        env:
          PR_REPO: ${{ github.repository }}
          PR_BASE: ${{ github.ref_name }}
          PR_REASON: ${{ github.event.inputs.reason }}
        run: |
          branch="bless/golden-${{ github.run_id }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$branch"
          git add golden_references/
          if git diff --cached --quiet; then
            echo "No golden changes to bless — nothing to do."
            exit 0
          fi
          git commit -m "bless golden references: ${{ github.event.inputs.reason }}"
          git push origin "$branch"
          PR_HEAD="$branch" python - <<'PY'
          import json, os, urllib.request
          repo = os.environ["PR_REPO"]
          body = (
              "Regenerated golden KPI references in the CI container.\n\n"
              f"Reason: {os.environ['PR_REASON']}\n\n"
              "Review the per-KPI diff before merging."
          )
          payload = json.dumps({
              "title": "Bless golden references",
              "head": os.environ["PR_HEAD"],
              "base": os.environ["PR_BASE"],
              "body": body,
          }).encode()
          req = urllib.request.Request(
              f"https://api.github.com/repos/{repo}/pulls",
              data=payload,
              method="POST",
              headers={
                  "Authorization": f"Bearer {os.environ['GH_TOKEN']}",
                  "Accept": "application/vnd.github+json",
                  "X-GitHub-Api-Version": "2022-11-28",
                  "Content-Type": "application/json",
              },
          )
          try:
              with urllib.request.urlopen(req) as resp:
                  print("Opened PR:", json.load(resp).get("html_url"))
          except urllib.error.HTTPError as exc:  # surface the API error body, not just a code
              raise SystemExit(f"PR creation failed ({exc.code}): {exc.read().decode()}")
          PY
