# Tier 2 of the golden-reference gate: the heavy full-year pairs. These run ONLY
# for pull requests to main, and ONLY once every other CI workflow (quality,
# tests, golden-check) has already concluded successfully for the same commit —
# so we never spend the full-year compute when a cheaper check has already failed.
#
# Mechanism: triggered by the completion of each prerequisite workflow; each
# firing re-checks (via scripts/ci_all_green.sh) that ALL prerequisites are green
# for the head SHA, so only the last-completing one proceeds.

name: golden-year

on:
  workflow_run:
    workflows: ["quality", "tests", "golden-check"]
    types: [completed]

permissions:
  contents: read
  packages: read
  statuses: write     # to surface the result back onto the PR commit

jobs:
  gate:
    name: gate (all CI green?)
    # Only for a successful PR-triggered prerequisite run.
    if: >
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    outputs:
      go: ${{ steps.check.outputs.go }}
      matrix: ${{ steps.gen.outputs.matrix }}
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GH_REPO: ${{ github.repository }}
      SHA: ${{ github.event.workflow_run.head_sha }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
      - name: Are quality + tests + golden-check all green for this SHA?
        id: check
        run: |
          go="$(bash scripts/ci_all_green.sh "$SHA")"
          echo "go=$go" >> "$GITHUB_OUTPUT"
          echo "all-green=$go for $SHA"
      - name: Build full-year matrix
        id: gen
        if: steps.check.outputs.go == 'true'
        run: echo "matrix=$(python3 scripts/golden_matrix.py --horizon year)" >> "$GITHUB_OUTPUT"

  golden-year:
    name: golden-year ${{ matrix.setup }} / ${{ matrix.param }}
    needs: gate
    if: needs.gate.outputs.go == 'true'
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/fzj-iek3-vsa/hisim-test:py311
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.gate.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
      - name: Mark workspace as safe for git
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - name: Install HiSim package
        run: uv pip install --system -e .
      - name: Golden KPI check (full year)
        run: python scripts/golden_check.py --setup "${{ matrix.setup }}" --param "${{ matrix.param }}"
      - name: Upload deviation report
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: golden-year-report-${{ matrix.setup }}-${{ matrix.param }}
          path: results/golden-ref-check/report.*
          if-no-files-found: warn

  report-status:
    name: report status to PR
    needs: [gate, golden-year]
    if: always() && needs.gate.outputs.go == 'true'
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Set commit status
        run: |
          state="success"
          if [ "${{ needs.golden-year.result }}" != "success" ]; then state="failure"; fi
          gh api -X POST "repos/${{ github.repository }}/statuses/${{ github.event.workflow_run.head_sha }}" \
            -f state="$state" \
            -f context="golden-year" \
            -f description="Full-year golden KPI check: $state"
