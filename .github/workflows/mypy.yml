name: Mypy

on:
  push:
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    name: Mypy
    steps:
    - uses: actions/checkout@v6
    - name: Set up Python 3.11
      uses: actions/setup-python@v6
      with:
        python-version: "3.11"
    - name: Set up uv
      uses: astral-sh/setup-uv@v5
    - name: Install Dependencies
      run: |
        uv pip install --system mypy
        uv pip install --system pytest
        uv pip install --system -r requirements.txt
    - name: mypy hisim
      run: mypy -p hisim --config-file mypy.ini
    - name: mypy system_setups
      if: always()
      run: mypy --config-file mypy_moderate.ini system_setups/
    - name: mypy tests
      if: always()
      run: mypy --config-file mypy_moderate.ini tests/
