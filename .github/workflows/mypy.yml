name: Mypy

on:
  push:
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  packages: read

jobs:
  build:
    runs-on: ubuntu-latest
    name: Mypy
    container:
      image: ghcr.io/fzj-iek3-vsa/hisim-test:py311
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
    - uses: actions/checkout@v6
    - name: Mark workspace as safe for git
      # The container runs as a different user than the one that owns the
      # checked-out workspace, so git would otherwise refuse with
      # "detected dubious ownership" (exit 128) on every git invocation.
      run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
    - name: Install Dependencies
      run: |
        uv pip install --system mypy
        uv pip install --system pytest
        uv pip install --system -r requirements.txt
    - name: mypy hisim
      run: mypy -p hisim --config-file mypy.ini
    - name: mypy system_setups
      if: always()
      run: mypy --config-file mypy_moderate.ini system_setups/
    - name: mypy tests
      if: always()
      run: mypy --config-file mypy_moderate.ini tests/
