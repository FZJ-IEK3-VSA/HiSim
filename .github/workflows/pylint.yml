name: Pylint

on: [push]

permissions:
  contents: read
  packages: read

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/fzj-iek3-vsa/hisim-test:py311
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
    - uses: actions/checkout@v6
    - name: Mark workspace as safe for git
      # The container runs as a different user than the one that owns the
      # checked-out workspace, so git would otherwise refuse with
      # "detected dubious ownership" (exit 128) on every git invocation.
      run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
    - name: Install dependencies
      run: |
        uv pip install --system pylint
    - name: Analysing the code with pylint
      run: |
        pylint --rcfile pylintrc-critical-only $(git ls-files '*.py')
