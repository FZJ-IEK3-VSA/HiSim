# Copy of pytest-base.yml that runs inside the prebuilt HiSim test image.
# This exists so CI timings can be compared directly against the normal base workflow.

name: pytest base tests docker image

on:
  push:
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  packages: read

env:
  TEST_IMAGE: ghcr.io/fzj-iek3-vsa/hisim-test:py311

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/fzj-iek3-vsa/hisim-test:py311
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
    - uses: actions/checkout@v6
    - name: Install HiSim package
      run: |
        uv pip install --system -e .
    - name: Test with pytest
      working-directory: ./tests/
      run: |
        coverage run --parallel-mode --source=../hisim -m pytest -m "base" --durations=20
    - name: Upload coverage data
      if: always()
      uses: actions/upload-artifact@v6
      with:
        name: coverage-pytest-base-docker
        path: tests/.coverage.*
        include-hidden-files: true
        if-no-files-found: warn
