# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-python-with-github-actions

name: pytest others

on:
  push:
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
    - name: Set up Python 3.11
      uses: actions/setup-python@v6
      with:
        python-version: "3.11"
    - name: Set up uv
      uses: astral-sh/setup-uv@v5
    - name: Setup Graphviz
      uses: ts-graphviz/setup-graphviz@v1
    - name: Install dependencies
      run: |
        uv pip install --system coverage
        if [ -f requirements.txt ]; then uv pip install --system -r requirements.txt; fi
        uv pip install --system -e .
    - name: Test with pytest
      working-directory: ./tests/
      run: |
        sh -c '
          markers="not base and not buildingtest and not system_setups and not extendedbase"
          markers="$markers and not utsp and not jsonconfig and not postprocessingoptions"
          coverage run --parallel-mode --source=../hisim -m pytest \
            -m "$markers" \
            --durations=20
          ret=$?
          [ $ret = 5 ] && exit 0 || [ $ret = 0 ] && exit 0 || exit 1
        '
        #        
    - name: Upload coverage data
      if: always()
      uses: actions/upload-artifact@v6
      with:
        name: coverage-pytest-others
        path: tests/.coverage.*
        include-hidden-files: true
        if-no-files-found: warn

    #    # stop the build if there are Python syntax errors or undefined names
       
    #    # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
    #    flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
