# This workflow runs the dedicated PostProcessingOptions tests.

name: pytest PostProcessingOption-Tests

on:
  push:
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
    - name: Set up Python 3.11
      uses: actions/setup-python@v6
      with:
        python-version: "3.11"
    - name: Set up uv
      uses: astral-sh/setup-uv@v5
    - name: Setup Graphviz
      uses: ts-graphviz/setup-graphviz@v1
    - name: Install dependencies
      run: |
        uv pip install --system coverage
        if [ -f requirements.txt ]; then uv pip install --system -r requirements.txt; fi
        uv pip install --system -e .
    - name: Test with pytest
      working-directory: ./tests/
      run: |
        coverage run --parallel-mode --source=../hisim -m pytest -m "postprocessingoptions" --durations=40
    - name: Upload coverage data
      if: always()
      uses: actions/upload-artifact@v6
      with:
        name: coverage-pytest-postprocessingoptions
        path: tests/.coverage.*
        include-hidden-files: true
        if-no-files-found: warn
