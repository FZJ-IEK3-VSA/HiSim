# Runs the dedicated PostProcessingOptions tests inside the prebuilt HiSim test image.

name: pytest PostProcessingOption-Tests

on:
  push:
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  packages: read

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/fzj-iek3-vsa/hisim-test:py311
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
    - uses: actions/checkout@v6
    - name: Mark workspace as safe for git
      # The container runs as a different user than the one that owns the
      # checked-out workspace, so git would otherwise refuse with
      # "detected dubious ownership" (exit 128) on every git invocation.
      run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
    - name: Install HiSim package
      run: |
        uv pip install --system -e .
    - name: Test with pytest
      working-directory: ./tests/
      run: |
        coverage run --parallel-mode --source=../hisim -m pytest -m "postprocessingoptions" --durations=40
    - name: Upload coverage data
      if: always()
      uses: actions/upload-artifact@v6
      with:
        name: coverage-pytest-postprocessingoptions
        path: tests/.coverage.*
        include-hidden-files: true
        if-no-files-found: warn
