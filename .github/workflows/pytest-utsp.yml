# Runs the utsp pytest suite inside the prebuilt HiSim test image.
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-python-with-github-actions

name: pytest utsp

on:
  push:
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  packages: read

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/fzj-iek3-vsa/hisim-test:py311
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
    - uses: actions/checkout@v6
    - name: Mark workspace as safe for git
      # The container runs as a different user than the one that owns the
      # checked-out workspace, so git would otherwise refuse with
      # "detected dubious ownership" (exit 128) on every git invocation.
      run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
    - name: Install HiSim package
      run: |
        uv pip install --system -e .
    - name: Test with pytest
      env:
        UTSP_URL: ${{ secrets.UTSP_URL }}
        UTSP_API_KEY: ${{ secrets.UTSP_API_KEY }}
      working-directory: ./tests/
      run: |
        coverage run --parallel-mode --source=../hisim -m pytest -m "utsp" --durations=20
    - name: Upload coverage data
      if: always()
      uses: actions/upload-artifact@v6
      with:
        name: coverage-pytest-utsp
        path: tests/.coverage.*
        include-hidden-files: true
        if-no-files-found: warn
