image: ghcr.io/astral-sh/uv:python3.11-bookworm

workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "web"'
    - when: never

stages:
  - lint
  - quality
  - typecheck
  - test
  - coverage
  - package
  - publish

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  UV_CACHE_DIR: "$CI_PROJECT_DIR/.cache/uv"
  HISIM_TEST_IMAGE: "$CI_REGISTRY_IMAGE/hisim-test:py311"

cache:
  key: "$CI_COMMIT_REF_SLUG"
  paths:
    - .cache/pip
    - .cache/uv

.uv_project_setup:
  before_script:
    - if [ -f requirements.txt ]; then uv pip install --system -r requirements.txt; fi
    - uv pip install --system -e .

.uv_graphviz_project_setup:
  before_script:
    - apt-get update
    - apt-get install -y --no-install-recommends graphviz
    - if [ -f requirements.txt ]; then uv pip install --system -r requirements.txt; fi
    - uv pip install --system -e .

.pytest_template:
  stage: test
  needs:
    - ruff
  before_script:
    - apt-get update
    - apt-get install -y --no-install-recommends graphviz
    - uv pip install --system coverage
    - if [ -f requirements.txt ]; then uv pip install --system -r requirements.txt; fi
    - uv pip install --system -e .
  after_script:
    - mkdir -p "coverage-data/$CI_JOB_NAME"
    - if ls tests/.coverage.* >/dev/null 2>&1; then cp tests/.coverage.* "coverage-data/$CI_JOB_NAME/"; fi
  artifacts:
    when: always
    paths:
      - coverage-data/
      - tests/pytest-*.xml
    reports:
      junit: tests/pytest-*.xml
    expire_in: 1 week

ruff:
  stage: lint
  needs: []
  before_script:
    - uv pip install --system ruff
  script:
    - ruff check . --exclude obsolete

prospector:
  stage: quality
  needs:
    - ruff
  before_script:
    - uv pip install --system 'prospector[with_everything]'
    - uv pip install --system 'prospector[with-everything]'
    - uv pip install --system 'prospector[with_bandit]'
    - uv pip install --system 'prospector[with_mypy]'
    - uv pip install --system 'prospector[with_pyroma]'
    - uv pip install --system 'prospector[with_vulture]'
    - if [ -f requirements.txt ]; then uv pip install --system -r requirements.txt; fi
    - uv pip install --system -e .
  script:
    - prospector setup.py
    - prospector system_setups/
    - prospector tests/
    - prospector hisim/
    - prospector docs/

pylint:
  stage: quality
  needs:
    - ruff
  before_script:
    - uv pip install --system pylint
  script:
    - pylint --rcfile pylintrc-critical-only $(git ls-files '*.py')

mypy:
  stage: typecheck
  needs:
    - ruff
  before_script:
    - uv pip install --system mypy
    - uv pip install --system pytest
    - uv pip install --system -r requirements.txt
  script:
    - mypy -p hisim --config-file mypy.ini
    - mypy --config-file mypy_moderate.ini system_setups/
    - mypy --config-file mypy_moderate.ini tests/

basic-execution:
  stage: test
  needs:
    - ruff
  extends: .uv_graphviz_project_setup
  script:
    - cd system_setups
    - python ../hisim/hisim_main.py household_heatpump_building_sizer.py

pytest-base:
  extends: .pytest_template
  script:
    - cd tests
    - coverage run --parallel-mode --source=../hisim -m pytest -m "base" --durations=20 --junitxml=pytest-base.xml

pytest-extendedbase:
  extends: .pytest_template
  script:
    - cd tests
    - coverage run --parallel-mode --source=../hisim -m pytest -m "extendedbase" --durations=20 --junitxml=pytest-extendedbase.xml

pytest-buildingtest:
  extends: .pytest_template
  script:
    - cd tests
    - coverage run --parallel-mode --source=../hisim -m pytest -m "buildingtest" --durations=20 --junitxml=pytest-buildingtest.xml

pytest-system-setups:
  extends: .pytest_template
  script:
    - cd tests
    - coverage run --parallel-mode --source=../hisim -m pytest -m "system_setups" --durations=20 --junitxml=pytest-system-setups.xml

pytest-jsonconfig:
  extends: .pytest_template
  script:
    - cd tests
    - coverage run --parallel-mode --source=../hisim -m pytest -m "jsonconfig" --durations=20 --junitxml=pytest-jsonconfig.xml

pytest-postprocessingoptions:
  extends: .pytest_template
  script:
    - cd tests
    - coverage run --parallel-mode --source=../hisim -m pytest -m "postprocessingoptions" --durations=40 --junitxml=pytest-postprocessingoptions.xml

pytest-others:
  extends: .pytest_template
  script:
    - cd tests
    - |
      markers="not base and not buildingtest and not system_setups and not extendedbase"
      markers="$markers and not utsp and not jsonconfig and not postprocessingoptions"
      coverage run --parallel-mode --source=../hisim -m pytest \
        -m "$markers" \
        --durations=20 \
        --junitxml=pytest-others.xml
      ret=$?
      [ $ret = 5 ] && exit 0 || [ $ret = 0 ] && exit 0 || exit 1

pytest-utsp:
  extends: .pytest_template
  script:
    - cd tests
    - coverage run --parallel-mode --source=../hisim -m pytest -m "utsp" --durations=20 --junitxml=pytest-utsp.xml

pytest-base-docker:
  stage: test
  needs:
    - ruff
  image: "$HISIM_TEST_IMAGE"
  allow_failure: true
  before_script:
    - uv pip install --system -e .
  after_script:
    - mkdir -p "coverage-data/$CI_JOB_NAME"
    - if ls tests/.coverage.* >/dev/null 2>&1; then cp tests/.coverage.* "coverage-data/$CI_JOB_NAME/"; fi
  script:
    - cd tests
    - coverage run --parallel-mode --source=../hisim -m pytest -m "base" --durations=20 --junitxml=pytest-base-docker.xml
  artifacts:
    when: always
    paths:
      - coverage-data/
      - tests/pytest-base-docker.xml
    reports:
      junit: tests/pytest-base-docker.xml
    expire_in: 1 week

coverage:
  stage: coverage
  needs:
    - job: pytest-base
      artifacts: true
    - job: pytest-extendedbase
      artifacts: true
    - job: pytest-buildingtest
      artifacts: true
    - job: pytest-system-setups
      artifacts: true
    - job: pytest-jsonconfig
      artifacts: true
    - job: pytest-postprocessingoptions
      artifacts: true
    - job: pytest-others
      artifacts: true
    - job: pytest-utsp
      artifacts: true
  before_script:
    - uv pip install --system coverage
  script:
    - find coverage-data -type f -name '.coverage*' > coverage-file-list.txt
    - test -s coverage-file-list.txt
    - mkdir -p coverage-combine
    - index=0
    - |
      while IFS= read -r coverage_file; do
        cp "$coverage_file" "coverage-combine/.coverage.$index"
        index=$((index + 1))
      done < coverage-file-list.txt
    - coverage combine coverage-combine
    - coverage report
    - coverage xml -o coverage.xml
    - coverage html -d htmlcov
  artifacts:
    when: always
    paths:
      - coverage.xml
      - htmlcov/
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    expire_in: 1 week

docker-image:
  stage: package
  needs:
    - ruff
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  rules:
    - when: manual
  script:
    - docker build . --file Dockerfile --tag "hisim_utsp:$CI_COMMIT_SHORT_SHA"

docker-test-image:
  stage: package
  needs:
    - ruff
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      changes:
        - Dockerfile.test
        - requirements.txt
        - setup.py
        - setup.cfg
        - pyproject.toml
        - README.md
        - .gitlab-ci.yml
    - when: manual
  script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
    - docker build --pull --file Dockerfile.test --tag "$HISIM_TEST_IMAGE" .
    - docker push "$HISIM_TEST_IMAGE"

paper-draft:
  stage: package
  needs:
    - ruff
  image:
    name: openjournals/inara:latest
    entrypoint: [""]
  script:
    - GIT_SHA="$CI_COMMIT_SHA" JOURNAL=joss inara -o pdf ./paper/paper.md
  artifacts:
    when: always
    paths:
      - paper/paper.pdf
    expire_in: 1 week

pypi-build:
  stage: package
  needs:
    - ruff
  extends: .uv_graphviz_project_setup
  rules:
    - if: '$CI_COMMIT_TAG'
    - if: '$CI_PIPELINE_SOURCE == "web"'
      when: manual
    - when: manual
  script:
    - uv pip install --system wheel
    - python setup.py sdist bdist_wheel
  artifacts:
    paths:
      - dist/
    expire_in: 1 week

pypi-publish:
  stage: publish
  needs:
    - job: pypi-build
      artifacts: true
  rules:
    - if: '$CI_COMMIT_TAG'
      when: manual
    - if: '$CI_PIPELINE_SOURCE == "web"'
      when: manual
    - when: never
  before_script:
    - uv pip install --system twine
  script:
    - test -n "$PYPI_API_TOKEN"
    - TWINE_USERNAME=__token__ TWINE_PASSWORD="$PYPI_API_TOKEN" twine upload dist/*
